<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>PawSome — Premium Pet Products, South Africa</title>
<meta name="description" content="South African pet products with a heart. Every dog & cat product can also be gifted to Wollies Dog Rescue or the SPCA — filmed and shared on TikTok."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;0,900;1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #1B4332; --forest-2: #2D6A4F; --forest-deep: #0B2017;
  --flame: #E85D04; --flame-2: #F77F3A; --cream: #FBF7F0; --paper: #FFFFFF;
  --ink: #1A1A18; --mid: #5C5C53; --soft: #8E8E81; --border: #E6E0D2;
  --gold: #D4A24E; --heart: #D9527A;
  --shadow: 0 8px 28px rgba(11,32,23,0.10); --shadow-lg: 0 24px 60px rgba(11,32,23,0.18);
  --display: 'Fraunces', serif; --font: 'Plus Jakarta Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--cream);color:var(--ink);line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block} button{font-family:inherit;cursor:pointer;border:none;background:none} a{color:inherit;text-decoration:none} ul{list-style:none}
.wrap{max-width:1280px;margin:0 auto;padding:0 20px}
.mobile-only{display:block} .desktop-only{display:none}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}

/* ============ MOBILE TOPBAR ============ */
.topbar-mobile{position:sticky;top:0;z-index:300;background:var(--forest);color:#fff}
.topbar-inner{display:flex;align-items:center;gap:10px;padding:12px 16px}
.hamburger{width:38px;height:38px;border:none;background:rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;flex-shrink:0;transition:background .2s}
.hamburger:active{background:rgba(255,255,255,.25)}
.hamburger span{width:16px;height:2px;background:#fff;border-radius:2px;transition:transform .25s,opacity .25s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.brand{font-family:var(--display);font-weight:700;font-size:1.28rem;letter-spacing:-0.3px;white-space:nowrap}
.brand em{font-style:italic;color:var(--flame-2)}
.topbar-spacer{flex:1}
.icon-btn{width:38px;height:38px;border:none;background:rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;color:#fff;font-size:1.05rem;transition:background .2s,transform .15s}
.icon-btn:active{transform:scale(.92)}
.cart-badge{position:absolute;top:-5px;right:-5px;background:var(--flame);color:#fff;font-size:.62rem;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--forest)}
.search-row{padding:0 16px 12px}
.search-box{position:relative}
.search-box input{width:100%;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:11px 14px 11px 38px;color:#fff;font-size:.88rem;font-family:var(--font);outline:none;transition:background .2s,border-color .2s}
.search-box input::placeholder{color:rgba(255,255,255,.65)}
.search-box input:focus{background:rgba(255,255,255,.2);border-color:var(--flame-2)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.75;font-size:.9rem}
.search-suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--paper);border-radius:14px;box-shadow:var(--shadow-lg);overflow:hidden;z-index:400;display:none;max-height:60vh;overflow-y:auto}
.search-suggest.open{display:block}
.suggest-item{display:flex;align-items:center;gap:10px;padding:11px 14px;color:var(--ink);font-size:.85rem;font-weight:600;border-bottom:1px solid var(--border);transition:background .15s}
.suggest-item:last-child{border-bottom:none} .suggest-item:active,.suggest-item:hover{background:var(--cream)}

/* ============ SLIDE MENU (mobile hamburger) ============ */
.menu-overlay{position:fixed;inset:0;background:rgba(11,32,23,.55);backdrop-filter:blur(2px);z-index:900;opacity:0;pointer-events:none;transition:opacity .3s}
.menu-overlay.open{opacity:1;pointer-events:all}
.slide-menu{position:fixed;top:0;left:0;bottom:0;width:84vw;max-width:360px;background:var(--paper);z-index:901;transform:translateX(-105%);transition:transform .35s cubic-bezier(.2,.8,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.slide-menu.open{transform:translateX(0)}
.slide-menu-head{background:var(--forest);color:#fff;padding:24px 20px 20px;position:relative;overflow:hidden}
.slide-menu-head::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(232,93,4,.35),transparent 70%);border-radius:50%}
.slide-menu-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;font-size:1rem}
.slide-menu-head h3{font-family:var(--display);font-size:1.4rem;font-weight:700;margin-bottom:3px}
.slide-menu-head p{font-size:.78rem;opacity:.78}
.slide-cat{border-bottom:1px solid var(--border)}
.slide-cat-trigger{display:flex;align-items:center;gap:12px;padding:15px 20px;font-weight:700;font-size:.94rem;color:var(--ink);transition:background .15s;width:100%;text-align:left}
.slide-cat-trigger:active{background:var(--cream)}
.slide-cat-icon{width:34px;height:34px;border-radius:10px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.slide-cat-arrow{margin-left:auto;font-size:.7rem;color:var(--soft);transition:transform .25s}
.slide-cat.open .slide-cat-arrow{transform:rotate(90deg);color:var(--flame)}
.slide-sub{max-height:0;overflow:hidden;background:var(--cream);transition:max-height .3s ease}
.slide-cat.open .slide-sub{max-height:320px}
.slide-sub a{display:block;padding:11px 20px 11px 66px;font-size:.85rem;color:var(--mid);font-weight:500;border-bottom:1px solid rgba(0,0,0,.04);transition:color .15s}
.slide-sub a:active{color:var(--flame)}
.slide-menu-links{padding:8px 20px}
.slide-menu-links a{display:flex;align-items:center;gap:10px;padding:13px 0;font-weight:600;font-size:.88rem;color:var(--ink);border-bottom:1px solid var(--border)}
.wa-menu-btn{display:flex;align-items:center;justify-content:center;gap:9px;background:#25D366;color:#fff;border:none;border-radius:12px;padding:13px 16px;font-weight:700;font-size:.86rem;margin:16px 20px}

/* ============ DESKTOP NAV ============ */
.nav-desktop{display:none}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 4vw;height:72px;display:flex;align-items:center;gap:28px}
.nav-logo{font-family:var(--display);font-size:1.55rem;font-weight:700;color:var(--forest);letter-spacing:-.4px;white-space:nowrap}
.nav-logo em{font-style:italic;color:var(--flame)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-dd{position:relative}
.nav-link{display:flex;align-items:center;gap:5px;color:var(--ink);font-weight:600;font-size:.9rem;padding:9px 13px;border-radius:9px;transition:background .15s}
.nav-link:hover{background:rgba(27,67,50,.08)}
.nav-link .car{font-size:.6rem;color:var(--soft);transition:transform .2s}
.nav-dd.open .nav-link .car{transform:rotate(180deg)}
.mega{position:absolute;top:calc(100% + 12px);left:-20px;background:var(--paper);border-radius:18px;box-shadow:var(--shadow-lg);border:1px solid var(--border);width:620px;padding:22px;display:none;grid-template-columns:repeat(3,1fr);gap:6px 18px;opacity:0;transform:translateY(-8px);transition:opacity .2s,transform .2s}
.nav-dd.open .mega{display:grid;opacity:1;transform:translateY(0)}
.mega-col h4{display:flex;align-items:center;gap:8px;font-family:var(--display);font-size:.95rem;font-weight:700;color:var(--forest);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mega-col a{display:block;padding:6px 4px;font-size:.84rem;color:var(--mid);font-weight:500;border-radius:6px;transition:color .15s,background .15s}
.mega-col a:hover{color:var(--flame);background:var(--cream)}
.mega-col a.viewall{color:var(--forest);font-weight:700;margin-top:4px}
.nav-search{flex:1;max-width:340px;margin-left:auto;position:relative}
.nav-search input{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:11px;padding:10px 14px 10px 38px;font-size:.86rem;font-family:var(--font);outline:none;transition:border-color .2s,background .2s}
.nav-search input:focus{border-color:var(--flame);background:#fff}
.nav-search .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.6;font-size:.9rem}
.nav-search-suggest{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);border:1px solid var(--border);overflow:hidden;display:none;z-index:600}
.nav-search-suggest.open{display:block}
.nss-item{padding:10px 14px;font-size:.83rem;font-weight:600;color:var(--ink);border-bottom:1px solid var(--border);transition:background .15s}
.nss-item:last-child{border-bottom:none}
.nss-item:hover{background:var(--cream)}
.nav-cta{display:flex;align-items:center;gap:10px}
.nav-icon-btn{width:42px;height:42px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1.05rem;color:var(--forest);transition:background .2s}
.nav-icon-btn:hover{background:var(--border)}
.nav-cart-btn{display:flex;align-items:center;gap:8px;background:var(--forest);color:#fff;border-radius:11px;padding:10px 16px;font-weight:700;font-size:.86rem;position:relative;transition:background .2s}
.nav-cart-btn:hover{background:var(--forest-2)}
.cart-count{position:absolute;top:-6px;right:-6px;background:var(--flame);color:#fff;width:19px;height:19px;border-radius:50%;font-size:.62rem;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--cream)}

/* ============ BOTTOM TAB BAR (mobile) ============ */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--border);display:flex;z-index:250;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 16px rgba(0,0,0,.05)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 8px;color:var(--soft);font-size:.62rem;font-weight:700;transition:color .2s,transform .2s}
.tab-btn .tab-icon{font-size:1.18rem;transition:transform .2s}
.tab-btn.active{color:var(--forest)}
.tab-btn.active .tab-icon{transform:translateY(-2px)}
.tab-btn.active .tab-icon::after{content:"";display:block;width:4px;height:4px;background:var(--flame);border-radius:50%;margin:3px auto 0}

/* ============ PAGES ============ */
.page{display:none;padding-bottom:90px}
.page.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ============ HERO (unified - photo repositions via media query) ============ */
.hero{position:relative;background:linear-gradient(160deg,var(--forest-deep) 0%,var(--forest) 60%,var(--forest-2) 100%);color:#fff;overflow:hidden}
.hero-paws{position:absolute;inset:0;pointer-events:none;opacity:.14;z-index:1}
.hero-paws span{position:absolute;font-size:2.2rem;animation:floatPaw 9s ease-in-out infinite}
.hero-paws span:nth-child(1){top:10%;left:8%}
.hero-paws span:nth-child(2){top:60%;left:78%;animation-delay:1.6s;font-size:1.6rem}
.hero-paws span:nth-child(3){top:75%;left:18%;animation-delay:3.2s;font-size:1.3rem}
.hero-paws span:nth-child(4){top:22%;left:70%;animation-delay:4.8s;font-size:1.8rem}
@keyframes floatPaw{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-16px) rotate(8deg)}}
.hero-inner{position:relative;z-index:2;max-width:1280px;margin:0 auto;padding:30px 20px 38px}
.hero-visual{position:absolute;inset:0;z-index:0}
.hero-visual::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(11,32,23,.90) 0%,rgba(27,67,50,.84) 55%,rgba(45,106,79,.72) 100%)}
.hero-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center 20%}
.hero-floating-badge{display:none}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:rgba(232,93,4,.18);border:1px solid rgba(247,127,58,.4);color:var(--flame-2);font-size:.68rem;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:5px 11px;border-radius:20px;margin-bottom:14px;opacity:0;animation:riseIn .6s ease forwards}
.hero h1{font-family:var(--display);font-size:2.05rem;font-weight:700;line-height:1.12;margin-bottom:12px;opacity:0;animation:riseIn .6s ease .1s forwards}
.hero h1 em{font-style:italic;color:var(--flame-2)}
.hero p{font-size:.92rem;opacity:.82;max-width:320px;margin-bottom:22px;opacity:0;animation:riseIn .6s ease .2s forwards}
.hero-ctas{display:flex;gap:10px;margin-bottom:28px;opacity:0;animation:riseIn .6s ease .3s forwards}
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.btn-flame{background:var(--flame);color:#fff;padding:13px 22px;border-radius:12px;font-weight:800;font-size:.86rem;display:inline-flex;align-items:center;gap:8px;transition:transform .15s,background .2s;box-shadow:0 8px 20px rgba(232,93,4,.35)}
.btn-flame:hover{transform:translateY(-2px);background:var(--flame-2)}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.3);padding:13px 20px;border-radius:12px;font-weight:700;font-size:.86rem;transition:background .2s}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.hero-stats{display:flex;gap:10px;opacity:0;animation:riseIn .6s ease .4s forwards}
.hero-stat{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:12px 8px;text-align:center}
.hero-stat b{display:block;font-family:var(--display);font-size:1.3rem;font-weight:700;color:var(--flame-2)}
.hero-stat span{font-size:.62rem;opacity:.75;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* ============ REVEAL ============ */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease}
.reveal.shown{opacity:1;transform:translateY(0)}
.reveal-stagger.shown > *{animation:riseIn .55s ease forwards}
.reveal-stagger.shown > *:nth-child(6n+1){animation-delay:.02s} .reveal-stagger.shown > *:nth-child(6n+2){animation-delay:.09s}
.reveal-stagger.shown > *:nth-child(6n+3){animation-delay:.16s} .reveal-stagger.shown > *:nth-child(6n+4){animation-delay:.23s}
.reveal-stagger.shown > *:nth-child(6n+5){animation-delay:.3s} .reveal-stagger.shown > *:nth-child(6n+6){animation-delay:.37s}

/* ============ SECTIONS ============ */
.section{padding:36px 20px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:16px}
.eyebrow{font-size:.68rem;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--flame);margin-bottom:4px}
.section-head h2{font-family:var(--display);font-size:1.5rem;font-weight:700;color:var(--forest)}
.section-link{font-size:.78rem;font-weight:700;color:var(--forest);border-bottom:2px solid var(--flame);padding-bottom:1px;white-space:nowrap}

/* ============ CHIPS ============ */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:2px 20px 4px;margin:0 -20px 0;scrollbar-width:none;flex-wrap:nowrap}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--paper);border:1.5px solid var(--border);padding:8px 14px;border-radius:20px;font-size:.78rem;font-weight:700;color:var(--forest);display:flex;align-items:center;gap:6px;transition:background .2s,border-color .2s,transform .15s}
.chip:hover,.chip:active{transform:scale(.97);background:var(--forest);color:#fff;border-color:var(--forest)}

/* ============ IMPACT BAND ============ */
.impact-band{background:var(--forest-deep);color:#fff;position:relative;overflow:hidden}
.impact-band-glow{position:absolute;width:280px;height:280px;background:radial-gradient(circle,rgba(232,93,4,.25),transparent 70%);top:-90px;right:-60px}
.impact-inner{max-width:1280px;margin:0 auto;padding:28px 20px;position:relative}
.impact-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.impact-top .dot{width:7px;height:7px;border-radius:50%;background:var(--flame);animation:pulse 1.6s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.impact-band h3{font-family:var(--display);font-size:1.18rem;font-weight:700;margin-bottom:4px}
.impact-band p{font-size:.82rem;opacity:.75;margin-bottom:18px;max-width:440px}
.impact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.impact-cell{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 8px;text-align:center}
.impact-cell b{font-family:var(--display);font-size:1.5rem;font-weight:700;color:var(--flame-2);display:block}
.impact-cell span{font-size:.6rem;opacity:.7;font-weight:600;text-transform:uppercase}

/* ============ CATEGORY PILLS / PRODUCTS ============ */
.cat-pills{display:flex;gap:9px;overflow-x:auto;padding:0 20px 4px;margin:0 -20px 18px;scrollbar-width:none}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 16px;border-radius:16px;background:var(--paper);border:1.5px solid var(--border);min-width:72px;transition:all .2s}
.cat-pill .ic{font-size:1.4rem}
.cat-pill span:last-child{font-size:.68rem;font-weight:700;color:var(--mid)}
.cat-pill.active{background:var(--forest);border-color:var(--forest)}
.cat-pill.active span:last-child{color:#fff}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.product-card{background:var(--paper);border-radius:16px;overflow:hidden;border:1px solid var(--border);position:relative;transition:transform .2s,box-shadow .2s}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.product-media{background:linear-gradient(145deg,#F1ECE0,#E8E1D0);aspect-ratio:1/0.85;display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative;overflow:hidden}
.product-img{width:100%;height:100%;object-fit:contain;display:block}
.product-placeholder{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--soft)}
.product-placeholder .ph-icon{font-size:2.6rem;opacity:.6}
.product-placeholder span{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.product-media.no-image .product-img{display:none}
.product-media.no-image .product-placeholder{display:flex}
.product-badge{position:absolute;top:9px;left:9px;font-size:.6rem;font-weight:800;padding:4px 9px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px;z-index:2}
.product-badge.hot{background:var(--flame);color:#fff} .product-badge.new{background:var(--forest);color:#fff} .product-badge.sale{background:var(--gold);color:#fff}
.shelter-flag{position:absolute;top:9px;right:9px;width:26px;height:26px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:2}
.product-info{padding:11px 12px 13px}
.product-brand{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--flame);margin-bottom:3px}
.product-name{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:5px;min-height:2.1em}
.product-rating{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--soft);margin-bottom:8px}
.product-rating .stars{color:var(--gold)}
.product-price-row{display:flex;align-items:center;justify-content:space-between}
.product-price{font-family:var(--display);font-weight:700;font-size:1.02rem;color:var(--forest)}
.product-price .orig{font-family:var(--font);font-size:.68rem;color:var(--soft);text-decoration:line-through;font-weight:600;margin-left:4px}
.add-btn{width:30px;height:30px;border-radius:9px;background:var(--forest);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s}
.add-btn:hover{background:var(--flame);transform:scale(1.06)}

/* ============ TRAIL (signature element) ============ */
.trail{padding:8px 4px 4px}
.trail-line-h{display:none}
.trail-step{display:flex;gap:14px;position:relative;padding-bottom:26px}
.trail-step:last-child{padding-bottom:0}
.trail-line{position:absolute;left:19px;top:40px;bottom:0;width:2px;background:repeating-linear-gradient(to bottom,var(--border) 0 6px,transparent 6px 12px)}
.trail-num{width:40px;height:40px;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;z-index:2;box-shadow:0 0 0 5px var(--cream)}
.trail-step:nth-child(2) .trail-num{background:var(--flame)} .trail-step:nth-child(3) .trail-num{background:var(--gold)}
.trail-step:nth-child(4) .trail-num{background:var(--heart)} .trail-step:nth-child(5) .trail-num{background:var(--forest-2)}
.trail-text h4{font-size:.92rem;font-weight:800;color:var(--ink);margin-bottom:3px;margin-top:6px}
.trail-text p{font-size:.8rem;color:var(--mid);line-height:1.5}

/* ============ GIVE BACK PAGE ============ */
.give-hero{background:radial-gradient(circle at 30% 20%,rgba(232,93,4,.25),transparent 55%),linear-gradient(165deg,var(--forest-deep),var(--forest));color:#fff;padding:32px 20px 30px}
.give-hero h1{font-family:var(--display);font-size:1.65rem;font-weight:700;line-height:1.2;margin-bottom:10px}
.give-hero h1 em{font-style:italic;color:var(--flame-2)}
.give-hero p{font-size:.86rem;opacity:.82;max-width:320px}
.shelters-grid{display:block}
.shelter-card{background:var(--paper);border-radius:20px;border:1px solid var(--border);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s}
.shelter-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.shelter-banner{padding:22px 18px 18px;position:relative;color:#fff;overflow:hidden}
.shelter-banner.wollies{background:linear-gradient(135deg,#2D6A4F,#1B4332)}
.shelter-banner.spca{background:linear-gradient(135deg,#B45309,#92400E)}
.shelter-banner::after{content:"";position:absolute;right:-20px;bottom:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.08)}
.shelter-logo{width:50px;height:50px;background:rgba(255,255,255,.16);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:12px}
.shelter-banner h3{font-family:var(--display);font-size:1.25rem;font-weight:700;margin-bottom:3px}
.shelter-banner .tagline{font-size:.76rem;opacity:.85;font-weight:600}
.shelter-body{padding:18px}
.shelter-body p{font-size:.85rem;color:var(--mid);margin-bottom:14px;line-height:1.65}
.shelter-facts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.shelter-fact{background:var(--cream);border-radius:12px;padding:11px 10px}
.shelter-fact b{display:block;font-family:var(--display);font-size:1.1rem;color:var(--forest)}
.shelter-fact span{font-size:.64rem;color:var(--soft);font-weight:600;text-transform:uppercase}
.shelter-list li{display:flex;gap:9px;font-size:.82rem;color:var(--mid);padding:7px 0;border-bottom:1px dashed var(--border)}
.shelter-list li:last-child{border-bottom:none}
.shelter-list li .ic{color:var(--flame);flex-shrink:0}
.shelter-note{margin-top:14px;font-weight:700;color:var(--forest);font-size:.86rem}

/* ============ TIKTOK BAND ============ */
.tiktok-band{background:#0B0B0C;color:#fff;padding:30px 20px}
.tiktok-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.tiktok-logo{width:36px;height:36px;background:linear-gradient(135deg,#25F4EE,#FE2C55);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.tiktok-head h3{font-family:var(--display);font-size:1.1rem;font-weight:700}
.tiktok-head p{font-size:.72rem;opacity:.6}
.tiktok-scroll{display:flex;gap:11px;overflow-x:auto;margin:0 -20px;padding:0 20px 4px;scrollbar-width:none}
.tiktok-scroll::-webkit-scrollbar{display:none}
.tiktok-card{flex-shrink:0;width:140px;aspect-ratio:9/15.5;background:linear-gradient(160deg,#1B4332,#0B2017);border-radius:14px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:10px;transition:transform .25s}
.tiktok-card:hover{transform:translateY(-4px)}
.tiktok-card .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.tiktok-card-name{font-size:.68rem;font-weight:800;position:relative;line-height:1.3}
.tiktok-card-name span{display:block;font-size:.58rem;font-weight:600;opacity:.7;margin-top:2px}

/* ============ REVIEWS ============ */
.review-scroll{display:flex;gap:12px;overflow-x:auto;margin:0 -20px;padding:0 20px 4px;scrollbar-width:none}
.review-scroll::-webkit-scrollbar{display:none}
.review-card{flex-shrink:0;width:250px;background:var(--paper);border:1px solid var(--border);border-radius:16px;padding:16px}
.review-stars{color:var(--gold);font-size:.8rem;margin-bottom:8px}
.review-text{font-size:.82rem;color:var(--mid);margin-bottom:12px;line-height:1.5}
.reviewer{font-size:.78rem;font-weight:700;color:var(--ink)} .reviewer span{font-weight:500;color:var(--soft)}

/* ============ LOYALTY ============ */
.loyalty-card{background:linear-gradient(135deg,var(--flame),var(--gold));border-radius:20px;padding:24px 20px;color:#fff;position:relative;overflow:hidden}
.loyalty-card::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.12)}
.loyalty-card h3{font-family:var(--display);font-size:1.3rem;font-weight:700;margin-bottom:6px}
.loyalty-card p{font-size:.82rem;opacity:.9;margin-bottom:16px;max-width:280px}
.loyalty-form{display:flex;gap:8px}
.loyalty-form input{flex:1;border:none;border-radius:11px;padding:12px 14px;font-size:.84rem;outline:none}
.loyalty-form button{background:var(--forest-deep);color:#fff;border-radius:11px;padding:12px 16px;font-weight:800;font-size:.82rem}

/* ============ FOOTER ============ */
footer{background:var(--forest-deep);color:rgba(255,255,255,.65)}
.footer-inner{max-width:1280px;margin:0 auto;padding:34px 20px 100px;display:grid;grid-template-columns:1fr;gap:30px;text-align:center}
.footer-brand{font-family:var(--display);color:#fff;font-size:1.2rem;font-weight:700;margin-bottom:8px}
.footer-inner > div:first-child p{font-size:.76rem;max-width:280px;margin:0 auto;line-height:1.6}
.footer-col h5{color:#fff;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.footer-col a{display:block;font-size:.8rem;padding:5px 0;transition:color .15s}
.footer-col a:hover{color:var(--flame-2)}
.footer-socials{display:flex;gap:10px;justify-content:center;margin-top:14px}
.footer-socials a{width:34px;height:34px;background:rgba(255,255,255,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding:16px 20px 100px;text-align:center;font-size:.7rem;opacity:.5}

/* ============ SHOP PAGE ============ */
.shop-head{padding:18px 20px 10px;background:var(--paper);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.shop-head h1{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--forest);margin-bottom:12px}
.subcat-bar{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.subcat-bar::-webkit-scrollbar{display:none}
.subcat-pill{flex-shrink:0;padding:7px 13px;border-radius:16px;background:var(--cream);font-size:.74rem;font-weight:700;color:var(--mid);transition:all .15s}
.subcat-pill.active{background:var(--forest);color:#fff}
.shop-results{padding:16px 20px 0;font-size:.78rem;color:var(--soft);font-weight:600}
.shop-grid-wrap{padding:0 20px}
.empty-state{text-align:center;padding:50px 30px;color:var(--soft);grid-column:1/-1}
.empty-state .ic{font-size:2.6rem;margin-bottom:10px}

/* ============ ACCOUNT PAGE ============ */
.account-card{background:linear-gradient(135deg,var(--forest),var(--forest-deep));color:#fff;border-radius:18px;padding:22px 18px;margin-bottom:18px}
.account-card h3{font-family:var(--display);font-size:1.15rem;font-weight:700;margin-bottom:4px}
.account-card p{font-size:.78rem;opacity:.75}
.account-item{display:flex;align-items:center;gap:13px;padding:14px 4px;border-bottom:1px solid var(--border)}
.account-item-icon{width:38px;height:38px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1rem}
.account-item-text h4{font-size:.86rem;font-weight:700} .account-item-text p{font-size:.72rem;color:var(--soft)}
.account-item-arrow{margin-left:auto;color:var(--soft)}

/* ============ CART PANEL (sheet on mobile, drawer on desktop) ============ */
.cart-overlay{position:fixed;inset:0;background:rgba(11,32,23,.55);z-index:900;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-panel{position:fixed;left:0;right:0;bottom:0;background:var(--paper);border-radius:22px 22px 0 0;z-index:901;max-height:85vh;display:flex;flex-direction:column;transform:translateY(105%);transition:transform .35s cubic-bezier(.2,.8,.2,1);padding-bottom:env(safe-area-inset-bottom)}
.cart-panel.open{transform:translateY(0)}
.cart-panel-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;flex-shrink:0}
.drawer-head{padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.drawer-head h3{font-family:var(--display);font-size:1.2rem;font-weight:700;color:var(--forest)}
.drawer-close{width:32px;height:32px;background:var(--cream);border-radius:50%;font-size:1rem}
.cart-scroll-area{flex:1;overflow-y:auto;min-height:0}
.drawer-body{padding:6px 22px}
.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);align-items:center}
.ci-media{width:58px;height:58px;border-radius:12px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-info h4{font-size:.84rem;font-weight:700;margin-bottom:3px}
.ci-shelter{font-size:.68rem;color:var(--forest);font-weight:700}
.ci-price{font-family:var(--display);font-weight:700;color:var(--forest);font-size:.9rem;margin-top:4px}
.qty-stepper{display:flex;align-items:center;gap:10px;background:var(--cream);border-radius:10px;padding:5px 8px}
.qty-stepper button{font-weight:800;color:var(--forest);font-size:.95rem}
.qty-stepper span{font-size:.82rem;font-weight:700;min-width:14px;text-align:center}
.drawer-foot{padding:14px 22px 20px;border-top:1px solid var(--border);flex-shrink:0}
.summary-row{display:flex;justify-content:space-between;font-size:.84rem;color:var(--mid);padding:5px 0}
.summary-row.shelter{color:var(--forest);font-weight:700}
.summary-row.total{border-top:1.5px dashed var(--border);margin-top:6px;padding-top:11px;font-size:1rem;font-weight:800;color:var(--ink)}
.checkout-btn{width:100%;background:var(--flame);color:#fff;border-radius:14px;padding:15px;font-weight:800;font-size:.9rem;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px rgba(232,93,4,.3)}
.empty-cart{text-align:center;padding:50px 20px;color:var(--soft)}
.empty-cart .ic{font-size:2.6rem;margin-bottom:10px}

/* ============ MODALS (donation + checkout): sheet on mobile, centered on desktop ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(11,32,23,.6);z-index:950;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--paper);border-radius:22px 22px 0 0;z-index:951;max-height:88vh;overflow-y:auto;transform:translateY(105%);transition:transform .35s cubic-bezier(.2,.8,.2,1);padding-bottom:env(safe-area-inset-bottom)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 4px}
.sheet-close{position:absolute;top:14px;right:16px;width:32px;height:32px;background:var(--cream);border-radius:50%;font-size:.95rem;color:var(--mid)}
.sheet-pad{padding:8px 22px 26px;position:relative}
.donation-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--heart),var(--flame));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin:6px 0 14px}
.sheet-pad h3{font-family:var(--display);font-size:1.25rem;font-weight:700;color:var(--forest);margin-bottom:6px}
.sheet-pad p.sub{font-size:.84rem;color:var(--mid);margin-bottom:18px;line-height:1.55}
.field{margin-bottom:14px}
.field label{display:block;font-size:.74rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.field input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:.88rem;font-family:var(--font);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--flame)}
.field-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pf-summary{background:var(--cream);border-radius:14px;padding:14px;margin-bottom:16px;font-size:.82rem}
.pf-summary-row{display:flex;justify-content:space-between;padding:4px 0;color:var(--mid)}
.pf-summary-row.total{font-weight:800;color:var(--ink);border-top:1px dashed var(--border);margin-top:6px;padding-top:8px}
.pf-pay-btn{width:100%;background:var(--forest);color:#fff;border-radius:14px;padding:16px 18px;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:space-between}
.pf-pay-btn:hover{background:var(--forest-2)}
.pf-secure{text-align:center;font-size:.7rem;color:var(--soft);margin-top:12px}

.wa-float{position:fixed;bottom:84px;right:16px;width:52px;height:52px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:200;color:#fff;animation:floatWa 2.4s ease-in-out infinite}
@keyframes floatWa{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.counted{font-variant-numeric:tabular-nums}

/* ============ SALES & CONVERSION ============ */
/* Stock badge */
.stock-badge{background:#ef4444;color:#fff;font-size:.6rem;font-weight:900;border-radius:7px;padding:3px 8px;position:absolute;top:8px;left:8px;z-index:5;letter-spacing:.02em;animation:stockPulse 2s ease-in-out infinite}
@keyframes stockPulse{0%,100%{opacity:1}50%{opacity:.75}}
/* Viewers on card */
.card-viewers{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.62);color:#fff;border-radius:7px;padding:3px 7px;font-size:.58rem;font-weight:700;backdrop-filter:blur(4px)}
/* Countdown banner */
.countdown-bar{background:linear-gradient(90deg,#ea580c,#dc2626);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:.8rem;font-weight:700;position:sticky;top:0;z-index:150;flex-wrap:wrap;gap:6px}
.countdown-time{font-family:var(--display);font-size:1rem;font-weight:900;background:rgba(0,0,0,.2);border-radius:8px;padding:2px 10px;letter-spacing:.06em;min-width:88px;text-align:center}
/* Free delivery tracker */
.free-del-widget{padding:13px 16px;background:#f0fdf4;border-bottom:1px solid #bbf7d0}
.free-del-text{font-size:.78rem;font-weight:700;color:#166534;margin-bottom:7px}
.free-del-track{background:#dcfce7;border-radius:100px;height:7px;overflow:hidden}
.free-del-progress{background:#22c55e;height:100%;border-radius:100px;transition:width .6s ease}
/* Bundle deal strip */
.bundle-strip{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:10px 14px;font-size:.78rem;font-weight:700;color:#92400e;margin:0 16px 12px;display:flex;align-items:center;gap:8px}
/* Trust tiles in checkout */
.checkout-trust{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:14px 0}
.trust-tile{background:var(--cream);border-radius:11px;padding:10px 8px;text-align:center;font-size:.68rem;font-weight:700;color:var(--mid);line-height:1.4}
.trust-tile .ti{font-size:1.15rem;display:block;margin-bottom:3px}
/* Thank you page */
.ty-wrap{padding:40px 24px;text-align:center;max-width:460px;margin:0 auto}
.ty-paw{font-size:4rem;margin-bottom:10px}
.ty-heading{font-family:var(--display);font-size:1.8rem;font-weight:900;color:var(--forest);margin-bottom:8px}
.ty-sub{color:var(--mid);line-height:1.65;margin-bottom:24px;font-size:.9rem}
.ty-card{background:var(--cream);border-radius:16px;padding:18px;margin-bottom:18px;text-align:left}
.ty-card h4{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--soft);margin-bottom:12px}
.ty-steps{list-style:none;padding:0;margin:0}
.ty-steps li{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:.84rem;color:var(--ink)}
.ty-steps li:last-child{border-bottom:none}
.ty-num{width:24px;height:24px;border-radius:50%;background:var(--forest);color:#fff;font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ty-wa{background:#25D366;color:#fff;border-radius:14px;padding:14px;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:10px;text-decoration:none;cursor:pointer;border:none}
.ty-shop{background:var(--forest);color:#fff;border-radius:14px;padding:14px;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;cursor:pointer;border:none}

/* ============ PRODUCT DETAIL DRAWER ============ */
.pd-sheet{position:fixed;bottom:0;left:0;right:0;max-height:94vh;background:#fff;border-radius:24px 24px 0 0;z-index:601;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.67,0);display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
.pd-sheet.open{transform:translateY(0)}
.pd-handle{width:40px;height:4px;background:var(--border);border-radius:100px;margin:12px auto 4px;flex-shrink:0}
.pd-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border:none;background:var(--cream);border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mid);z-index:2}
.pd-img-wrap{width:100%;aspect-ratio:1/1;background:var(--cream);display:flex;align-items:center;justify-content:center;overflow:hidden;max-height:260px;flex-shrink:0}
.pd-img-wrap img{width:100%;height:100%;object-fit:contain}
.pd-img-placeholder{font-size:5rem}
.pd-body{padding:18px 20px;overflow-y:auto;flex:1;min-height:0}
.pd-brand{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);margin-bottom:4px}
.pd-name{font-family:var(--display);font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.25}
.pd-rating-row{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--mid);margin-bottom:12px}
.pd-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.pd-price{font-family:var(--display);font-size:1.9rem;font-weight:900;color:var(--forest)}
.pd-orig-price{font-size:1rem;color:var(--soft);text-decoration:line-through}
.pd-desc{font-size:.86rem;color:var(--mid);line-height:1.7;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:18px}
.pd-qty-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.pd-qty-label{font-size:.82rem;font-weight:700;color:var(--ink)}
.pd-qty{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.pd-qty button{width:42px;height:42px;border:none;background:var(--cream);font-size:1.3rem;cursor:pointer;color:var(--forest);font-weight:800}
.pd-qty span{width:44px;text-align:center;font-weight:800;font-size:1rem;color:var(--ink)}
.pd-shelter-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:16px;padding:14px 16px;margin-bottom:20px}
.pd-shelter-title{font-size:.82rem;font-weight:800;color:var(--forest);margin-bottom:8px}
.pd-shelter-note{font-size:.78rem;color:var(--mid);line-height:1.55;margin-bottom:10px}
.pd-shelter-check{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:700;color:var(--forest);cursor:pointer}
.pd-shelter-check input{width:18px;height:18px;accent-color:var(--forest)}
.pd-footer{padding:14px 20px 20px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
